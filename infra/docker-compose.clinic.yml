version: "3.9"

# =============================================================================
# foreverhuman.health — Stack Clinică
# Un compose per clinică, pe VPS dedicat.
#
# Usage:
#   cp .env.clinic.example .env
#   docker compose -f docker-compose.clinic.yml up -d
#
# Variabile obligatorii în .env: vezi .env.clinic.example
# =============================================================================

networks:
  internal:
    driver: bridge
    internal: true       # fără acces extern direct
  proxy:
    driver: bridge       # doar nginx e expus

volumes:
  postgres_data:
  lancedb_data:
  n8n_data:
  redis_data:
  nginx_certs:
  nginx_vhost:
  nginx_html:

services:

  # ---------------------------------------------------------------------------
  # API — FastAPI (Python 3.12)
  # ---------------------------------------------------------------------------
  api:
    image: foreverhuman/api:${API_VERSION:-latest}
    build:
      context: ../platform/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      LANCEDB_PATH: /data/lancedb
      SECRET_KEY: ${SECRET_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_URL: ${OLLAMA_URL:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}   # anthropic | ollama
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}  # openai | ollama
      CLINIC_ID: ${CLINIC_ID}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - lancedb_data:/data/lancedb
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Database — PostgreSQL 16
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../platform/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Nicio expunere externă — acces DOAR din rețeaua internă

  # ---------------------------------------------------------------------------
  # LanceDB — Vector Store per clinică
  # ---------------------------------------------------------------------------
  lancedb:
    image: lancedb/lancedb:latest
    restart: unless-stopped
    environment:
      LANCEDB_DATA_PATH: /data
    volumes:
      - lancedb_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # n8n — Pipelines & Cron (sensor ingestion, document processing)
  # ---------------------------------------------------------------------------
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: db
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_POSTGRESDB_SCHEMA: n8n
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_HOST: ${DOMAIN}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://${DOMAIN}/n8n/
      EXECUTIONS_PROCESS: main
      # API keys pentru sub-agenți
      WITHINGS_CLIENT_ID: ${WITHINGS_CLIENT_ID:-}
      WITHINGS_CLIENT_SECRET: ${WITHINGS_CLIENT_SECRET:-}
      ULTRAHUMAN_API_KEY: ${ULTRAHUMAN_API_KEY:-}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      API_INTERNAL_URL: http://api:8000
      REDIS_URL: redis://redis:6379/1
    volumes:
      - n8n_data:/home/node/.n8n
      - ../platform/pipelines:/pipelines:ro   # workflows exportate
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Redis — Cache + Job Queue
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # Nginx — Reverse proxy + SSL (Let's Encrypt)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/clinic.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_certs:/etc/letsencrypt
      - nginx_vhost:/etc/nginx/vhost.d
      - nginx_html:/usr/share/nginx/html
    networks:
      - internal
      - proxy
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Certbot — SSL auto-renew
  # ---------------------------------------------------------------------------
  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - nginx_certs:/etc/letsencrypt
      - nginx_html:/usr/share/nginx/html
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /usr/share/nginx/html; sleep 12h & wait $${!}; done"
    networks:
      - proxy

  # ---------------------------------------------------------------------------
  # Infra Agent — Monitoring + Auto-repair
  # ---------------------------------------------------------------------------
  infra-agent:
    image: foreverhuman/infra-agent:${INFRA_AGENT_VERSION:-latest}
    build:
      context: ../platform/agents/infra
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DOCKER_SOCK: /var/run/docker.sock
      API_URL: http://api:8000
      REDIS_URL: redis://redis:6379/2
      ALERT_EMAIL: ${ADMIN_EMAIL}
      CLINIC_ID: ${CLINIC_ID}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - internal
    depends_on:
      - api
      - redis

  # ---------------------------------------------------------------------------
  # Watchtower — Auto-update imagini (opțional, dezactivat în prod strictă)
  # ---------------------------------------------------------------------------
  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: 86400     # 24h
      WATCHTOWER_INCLUDE_STOPPED: "false"
      WATCHTOWER_SCOPE: clinic             # actualizează doar containere cu label scope=clinic
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    profiles:
      - auto-update    # activat cu: docker compose --profile auto-update up -d
